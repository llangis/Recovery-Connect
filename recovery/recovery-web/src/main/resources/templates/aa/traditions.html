<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{partial :: head}"/>
    <title>AA - The 12 Traditions</title>
</head>
<body class="bg-gray-50 min-h-screen">

<nav th:replace="~{nav :: navbar}"></nav>

<div class="bg-gradient-to-r from-blue-800 to-blue-900 text-white py-12">
    <div class="max-w-5xl mx-auto px-4">
        <h1 class="text-3xl font-bold">The 12 Traditions</h1>
        <p class="text-blue-200 mt-2">Alcoholics Anonymous</p>
    </div>
</div>

<div class="max-w-3xl mx-auto px-4 py-10 space-y-4">
    <div th:each="tradition : ${traditions}" class="step-card border-blue-600">
        <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold text-lg">
                <span th:text="${tradition.traditionNumber}"></span>
            </div>
            <div>
                <h3 class="font-bold text-gray-900 text-lg" th:text="${tradition.title}"></h3>
                <p class="text-gray-600 mt-1" th:text="${tradition.description}"></p>
            </div>
        </div>
    </div>
</div>

</body>
</html>

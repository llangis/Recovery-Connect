spring.application.name=RecoveryPlatform
spring.datasource.url=jdbc:mysql://localhost:3306/recoverymicroservice
spring.datasource.username=devJPA
spring.datasource.password=NBCC1234!
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=8080
server.servlet.session.persistent=true
logging.level.root=info
logging.level.org.springframework.web=info
logging.level.nbcc=debug
logging.file.name=logs/recovery-web.log
spring.thymeleaf.cache=false
token.timeout=3600
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always